<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0e1117" />
    <meta name="color-scheme" content="dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="SMS Alert" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>SMS Alert</title>
    <script>
      // Fang install-prompten globalt og undertryk browserens egen banner.
      // Appen viser i stedet en egen "Installer"-knap – men kun når brugeren
      // er logget ind (knappen lever inde i det beskyttede layout).
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault()
        window.__deferredInstallPrompt = e
        window.dispatchEvent(new Event('pwa-installable'))
      })
      window.addEventListener('appinstalled', () => {
        window.__deferredInstallPrompt = null
        window.dispatchEvent(new Event('pwa-installed'))
      })
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
